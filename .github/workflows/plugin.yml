name: Plugin CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    tags: ["*"]

permissions: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    permissions: { }
    runs-on: ubuntu-slim
    timeout-minutes: 10
    outputs:
      VCPKG_BINARY_SOURCES: ${{ steps.config.outputs.VCPKG_BINARY_SOURCES }}
      VCPKG_VERSION: ${{ steps.config.outputs.VCPKG_VERSION }}
    steps:
      - name: Output config
        id: config
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          echo 'VCPKG_BINARY_SOURCES=clear' >> "${GITHUB_OUTPUT}"
          echo 'VCPKG_VERSION=2026.04.27' >> "${GITHUB_OUTPUT}"

  build-windows:
    needs: config
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-windows.yml
    with:
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
      vcpkg-version: ${{ needs.config.outputs.VCPKG_VERSION }}
    secrets:
      BRIA_SSO_SECRET: ${{ secrets.BRIA_SSO_SECRET }}
      BRIA_POSTHOG_API_KEY: ${{ secrets.BRIA_POSTHOG_API_KEY }}
      BRIA_SENTRY_DSN: ${{ secrets.BRIA_SENTRY_DSN }}

  build-macos:
    needs: config
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-macos.yml
    with:
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
      vcpkg-version: ${{ needs.config.outputs.VCPKG_VERSION }}
      # Sign/notarize only on trusted refs (push to main, tags, manual dispatch); never on PRs.
      codesign-enabled: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) }}
      DEVELOPER_DIR: /Applications/Xcode_16.4.app
    secrets:
      BRIA_SENTRY_DSN: ${{ secrets.BRIA_SENTRY_DSN }}
      BRIA_SSO_SECRET: ${{ secrets.BRIA_SSO_SECRET }}
      BRIA_POSTHOG_API_KEY: ${{ secrets.BRIA_POSTHOG_API_KEY }}
      MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
      MACOS_NOTARIZATION_USERNAME: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
      MACOS_SIGNING_APPLICATION_IDENTITY: ${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}
      MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
      MACOS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT }}
      MACOS_SIGNING_INSTALLER_IDENTITY: ${{ secrets.MACOS_SIGNING_INSTALLER_IDENTITY }}

  build-ubuntu:
    needs: config
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-ubuntu.yml
    with:
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
      vcpkg-version: ${{ needs.config.outputs.VCPKG_VERSION }}
    secrets:
      BRIA_SENTRY_DSN: ${{ secrets.BRIA_SENTRY_DSN }}
      BRIA_SSO_SECRET: ${{ secrets.BRIA_SSO_SECRET }}
      BRIA_POSTHOG_API_KEY: ${{ secrets.BRIA_POSTHOG_API_KEY }}

  accept-plugin:
    name: Accept Plugin CI
    needs: [ build-windows, build-macos, build-ubuntu ]
    runs-on: ubuntu-slim
    permissions: { }
    steps:
      - name: Accept plugin
        run: |
          echo 'The workflow plugin has completed successfully.'

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: accept-plugin
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    uses: ./.github/workflows/plugin-release.yml
