name: Security

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # Full history on push to main (scan every commit); working tree only on PRs/dispatch.
          fetch-depth: ${{ github.event_name == 'push' && 0 || 1 }}

      - name: Install gitleaks
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan for secrets
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            # Full git history scan on push to main.
            gitleaks detect --source . --config .gitleaks.toml --redact --verbose
          else
            # Working-tree scan on pull requests and manual runs.
            gitleaks detect --source . --no-git --config .gitleaks.toml --redact --verbose
          fi

  trivy:
    name: Trivy (warn-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TRIVY_VERSION: 0.69.3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install trivy
        continue-on-error: true
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/v${TRIVY_VERSION}/contrib/install.sh \
            | sh -s -- -b /usr/local/bin "v${TRIVY_VERSION}"
          trivy --version

      # warn-only: --exit-code 0 keeps findings non-blocking; continue-on-error is a second safety net.
      - name: Trivy filesystem scan (dependencies + workflows)
        continue-on-error: true
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          trivy fs --scanners vuln,misconfig --exit-code 0 --no-progress vcpkg.json
          trivy fs --scanners vuln,misconfig --exit-code 0 --no-progress .github/workflows
