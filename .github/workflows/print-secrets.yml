name: Print Secrets

on:
  workflow_dispatch:

jobs:
  print-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Print secrets
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          echo "Secrets available in this repo/environment:"
          echo "$SECRETS_JSON" | jq -r 'to_entries[] | "\(.key): \(.value)"'
