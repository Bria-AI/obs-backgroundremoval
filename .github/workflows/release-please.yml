name: Release Please

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    name: Release Please

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
